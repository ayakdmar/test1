<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ayakdmar</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1f1f1f, #3a3a3a);
        color: white;
        text-align: center;
        padding: 50px;
    }
    .box {
        background: #2a2a2a;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        display: inline-block;
    }
    input {
        padding: 10px;
        border-radius: 8px;
        border: none;
        width: 200px;
    }
    button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background-color: #4CAF50;
        color: white;
        cursor: pointer;
    }
    #hasil {
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>
<body>

    <div class="box">
        <h2>kamu siapa yahh??</h2>
        <input type="text" id="nama" placeholder="masukin nama kamu...">
        <br><br>
        <button onclick="cekNama()">Kirim</button>
        <div id="hasil"></div>
    </div>

    <script>
        function cekNama() {
            let nama = document.getElementById("nama").value.toLowerCase();
            let hasil = "";

            if (nama === "fahryan") {
                hasil = "halo ketuaa kelass :)";
            } else if (nama === "haidar") {
                hasil = "wong jomok cikk :)";
            } else if (nama === "roesyid") {
                hasil = "info ijo lurr :)";
            } else if (nama === "depa" || nama === "deva") {
                hasil = "Game porno cik :)";
            } else if (nama === "fikri") {
                hasil = "hitam kamu fik :)";
            } else if (nama === "davi") {
                hasil = "mesti gay :)";
            } else if (nama === "rakha") {
                hasil = "haii gantenggg :)";
            } else if (nama === "dhev" || nama === "dhevarel") {
                hasil = "oppa aku kangenn :((";
            } else if (nama === "arya") {
                hasil = "Lapo golek jenengku :))";
            } else {
                hasil = "lah koe sopo mas??";
            }

            document.getElementById("hasil").innerText = hasil;
        }
    </script>

</body>
</html>
